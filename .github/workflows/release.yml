name: Release

on:
  push:
    tags: ["v*"]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.r.outputs.version }}
      is_tag: ${{ steps.r.outputs.is_tag }}
      publish: ${{ steps.r.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
      - id: r
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="phonix") | .version')"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"   # main push → edge job handles it
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish-crate:
    name: Publish phonix (crates.io)
    needs: resolve
    if: needs.resolve.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: System deps (ALSA — cpal is pulled in transitively by oww-rs)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config
      - name: Verify version is not already on crates.io
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          UA="phonix-release-bot (https://github.com/${{ github.repository }})"
          CODE="$(curl -s -o /dev/null -w '%{http_code}' \
            -H "User-Agent: ${UA}" \
            "https://crates.io/api/v1/crates/phonix/${VERSION}")"
          if [[ "$CODE" == "200" ]]; then
            echo "::error::phonix@${VERSION} is already published on crates.io — bump the version before tagging"
            exit 1
          fi
          if [[ "$CODE" != "404" ]]; then
            echo "::error::crates.io lookup for phonix@${VERSION} returned HTTP ${CODE}"
            exit 1
          fi
      - name: Verify tag version matches Cargo.toml
        if: needs.resolve.outputs.is_tag == 'true'
        env:
          WANT: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          HAVE="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="phonix") | .version')"
          if [[ "$WANT" != "$HAVE" ]]; then
            echo "::error::tag v${WANT} does not match Cargo.toml version ${HAVE}"
            exit 1
          fi
          echo "Publishing phonix ${HAVE}"
      - name: cargo publish
        run: cargo publish -p phonix --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  docker:
    name: Build & push image (Docker Hub)
    needs: resolve
    if: needs.resolve.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Silero VAD model (Dockerfile build context)
        run: ./crates/phonix/models/fetch.sh
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: sustentabilitas/phonix-recall
          tags: |
            type=raw,value=${{ needs.resolve.outputs.version }}
            type=raw,value=latest,enable=${{ needs.resolve.outputs.is_tag == 'true' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/phonix-recall/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  edge:
    name: Build & push edge image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Silero VAD model (Dockerfile build context)
        run: ./crates/phonix/models/fetch.sh
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/phonix-recall/Dockerfile
          platforms: linux/amd64
          push: true
          tags: sustentabilitas/phonix-recall:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
