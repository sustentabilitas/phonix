name: Release

on:
  push:
    tags: ["v*"]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-crate:
    name: Publish phonix to crates.io
    runs-on: ubuntu-latest
    # Crate publish only on a version tag.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: System deps (ALSA — cpal is pulled in transitively by oww-rs)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config

      - name: Verify tag matches Cargo.toml version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          CRATE_VERSION="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="phonix") | .version')"
          if [[ "$TAG" != "$CRATE_VERSION" ]]; then
            echo "Tag v$TAG does not match crates/phonix Cargo.toml version $CRATE_VERSION" >&2
            exit 1
          fi
          echo "Releasing phonix $CRATE_VERSION"

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p phonix

  publish-image:
    name: Build & push phonix-recall image
    runs-on: ubuntu-latest
    # On a version tag → :X.Y.Z + :latest ; on a push to main → rolling :edge.
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Silero VAD model (required in the Dockerfile build context)
        run: ./crates/phonix/models/fetch.sh

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: sustentabilitas/phonix-recall
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/phonix-recall/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
